server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: mindshare
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:mindshare}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD:changeme}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: mindshare
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

mybatis:
  mapper-locations:
    - classpath*:mapper/*.xml
    - classpath*:mapper/**/*.xml
  type-aliases-package: com.mindshare
  configuration:
    map-underscore-to-camel-case: true

auth:
  jwt:
    issuer: ${AUTH_JWT_ISSUER:mindshare}
    access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:PT30M}
    refresh-token-ttl: ${AUTH_REFRESH_TOKEN_TTL:P14D}
    public-key-location: ${AUTH_PUBLIC_KEY_LOCATION:classpath:keys/public.pem}
    private-key-location: ${AUTH_PRIVATE_KEY_LOCATION:classpath:keys/private.pem}
  verification:
    code-length: ${AUTH_CODE_LENGTH:6}
    ttl: ${AUTH_CODE_TTL:PT5M}
    max-attempts: ${AUTH_CODE_MAX_ATTEMPTS:5}
    send-interval: ${AUTH_CODE_SEND_INTERVAL:PT60S}
    daily-limit: ${AUTH_CODE_DAILY_LIMIT:10}
  password:
    bcrypt-strength: ${AUTH_BCRYPT_STRENGTH:12}
    min-length: ${AUTH_PASSWORD_MIN_LENGTH:8}

oss:
  endpoint: ${OSS_ENDPOINT:https://oss-cn-hangzhou.aliyuncs.com}
  bucket: ${OSS_BUCKET:mindshare-dev}
  access-key-id: ${OSS_ACCESS_KEY_ID:test-access-key-id}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:test-access-key-secret}
  base-path: ${OSS_BASE_PATH:mindshare}
  presign-expire-seconds: ${OSS_PRESIGN_EXPIRE_SECONDS:600}

mindshare:
  cache:
    redis-enabled: true
    l2:
      public-cfg:
        ttl-seconds: 300
        max-size: 128
      mine-cfg:
        ttl-seconds: 180
        max-size: 128
      detail-cfg:
        ttl-seconds: 300
        max-size: 256
    hotkey:
      window-seconds: 60
      segment-seconds: 10
      level-low: 10
      level-medium: 50
      level-high: 100
      extend-low-seconds: 30
      extend-medium-seconds: 120
      extend-high-seconds: 300
  counter:
    redis-enabled: true
    rebuild:
      lock-ttl-ms: 5000
      rate-permits: 3
      rate-window-seconds: 10
      backoff-base-ms: 500
      backoff-max-ms: 30000
  elasticsearch:
    enabled: true
    index-name: ${ES_INDEX_NAME:mindshare_knowpost}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: false
