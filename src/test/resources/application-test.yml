spring:
  datasource:
    url: jdbc:h2:mem:mindshare;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: file:db/schema.sql

mindshare:
  cache:
    redis-enabled: false
  counter:
    redis-enabled: false
  elasticsearch:
    enabled: false
